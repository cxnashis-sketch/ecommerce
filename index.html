<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Cricketers</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        
        <div class="header_leftside">
            <h2>Donate Cricketers</h2>
        </div>

        <div class="header_rightside">
            🛒
            <span id="cart-items-count">0</span>
        </div>

    </div>

    <div class="main">

        <div class="card">
            <img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/2.png" class="card_img" alt="">
            <h3>Virat Kohli</h3>
            <p>score: 9000</p>
            <button class="donate-btn">Donate</button>
        </div>

        <div class="card">
            <img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/57.png" class="card_img" alt="">
            <h3>MS Dhoni</h3>
            <p>score: 8200</p>
            <button class="donate-btn">Donate</button>
        </div>

        <div class="card">
            <img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/6.png" class="card_img" alt="">
            <h3>Rohit Sharma</h3>
            <p>score: 4500</p>
            <button class="donate-btn">Donate</button>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRybPhJjzjn-LD3DSUFEPMmLkDchdQYlFmxuOmusJtPp9vviGIrXoRTRzRrhTqKcuv4xPPvEEwCleLIICUOqTovTZnj4ZgsxsTUszg7Cg&s=10" class="card_img" alt="">
            <h3>Sachin Tendulkar</h3>
            <p>score: 6000</p>
            <button class="donate-btn">Donate</button>
        </div>

        <div class="card">
            <img src="https://documents.iplt20.com/ipl/IPLHeadshot2026/190.png" class="card_img" alt="">
            <h3>Sanju Samson</h3>
            <p>score: 4000</p>
            <button class="donate-btn">Donate</button>
        </div>

    </div>

    <script src="cricket.js"></script>

</body>
</html>
